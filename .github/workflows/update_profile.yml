name: Sakurazaka Auto Sync

on:
  schedule:
    - cron: '0 0 * * *' # Jalan otomatis setiap jam 7 pagi WIB (00:00 UTC)
  workflow_dispatch: # Tombol manual di tab Actions

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Jalankan Scraper
        run: node update_member.js

      - name: Push Perubahan
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add blogprofil.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sync member data from official web [skip ci]" && git push)
