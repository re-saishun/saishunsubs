name: Sakurazaka Auto Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write  # PENTING: Agar bot bisa push perubahan ke repo

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Update ke v4
        with:
          node-version: 20 # Gunakan Node terbaru yang sudah dukung fetch bawaan

      - name: Jalankan Scraper
        run: node update_member.js

      - name: Push Perubahan
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add blogprofil.json
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data."
          else
            git commit -m "Auto-sync: Update member profiles [skip ci]"
            git push
          fi
